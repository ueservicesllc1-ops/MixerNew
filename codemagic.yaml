workflows:
  ios-native-workflow:
    name: Build Native Apple App (iOS, iPadOS)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      node: 22
    scripts:
      - name: Build Web App & Sync Capacitor iOS
        script: |
          set -e
          npm ci || npm install
          npm run build
          npx cap add ios || true
          npx cap sync ios

      - name: Build iOS App with Capacitor (100% Identical to Android)
        script: |
          set -e
          cd ios/App

          # Compilar el proyecto Xcode de Capacitor para iOS
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build_ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

          echo "======================================="
          echo "=== DIAGNÓSTICO DEL BUNDLE CAPACITOR IOS ==="
          echo "======================================="

          APP_DIR=$(find build_ios -type d -name "App.app" 2>/dev/null | head -1)

          if [ -n "$APP_DIR" ] && [ -d "$APP_DIR" ]; then
            echo "=== App.app encontrado en: $APP_DIR ==="

            # Inyectar binario si Xcode no lo colocó dentro de App.app por falta de firma
            if [ ! -f "$APP_DIR/App" ]; then
              echo "=== Buscando binario ejecutable para inyectar ==="
              BINARY=$(find build_ios -type f -name "App" ! -path "*.app/*" 2>/dev/null | while read f; do
                if file "$f" | grep -qi "mach-o"; then echo "$f"; break; fi
              done)
              if [ -n "$BINARY" ]; then
                echo "=== Inyectando binario: $BINARY ==="
                cp "$BINARY" "$APP_DIR/App"
                chmod +x "$APP_DIR/App"
              fi
            fi

            # Copiar frameworks dinámicos si existen en Release-iphoneos
            FW_DIR="build_ios/Build/Products/Release-iphoneos"
            if [ -d "$FW_DIR" ]; then
              for fw in "$FW_DIR"/*.framework; do
                [ ! -d "$fw" ] && continue
                fw_name=$(basename "$fw" .framework)
                if [ -f "$fw/$fw_name" ]; then
                  echo "=== Copiando framework dinámico: $fw_name ==="
                  mkdir -p "$APP_DIR/Frameworks"
                  cp -R "$fw" "$APP_DIR/Frameworks/"
                fi
              done
            fi

            rm -rf build_ios/Payload build_ios/ZionStageApple.ipa
            mkdir -p build_ios/Payload
            cp -R "$APP_DIR" build_ios/Payload/
            cd build_ios && zip -r ZionStageApple.ipa Payload

            echo "======================================="
            echo "=== TAMAÑO FINAL DEL IPA CAPACITOR ==="
            echo "======================================="
            ls -lah ZionStageApple.ipa
          else
            echo "!!! ERROR CRÍTICO: No se encontró App.app !!!"
            exit 1
          fi

    artifacts:
      - ios/App/build_ios/*.ipa
      - ios/App/build_ios/Build/Products/Release-iphoneos/*.app
