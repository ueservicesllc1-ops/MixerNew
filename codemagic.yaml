workflows:
  ios-native-workflow:
    name: Build Native Apple App (iOS, iPadOS, macOS)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Build iOS & iPadOS Physical App
        script: |
          cd ZionStageApple

          # Paso 1: Compilar sin firma para iOS
          xcodebuild build -project ZionStageApple.xcodeproj \
                     -scheme ZionStageApple \
                     -sdk iphoneos \
                     -configuration Release \
                     -derivedDataPath build_ios \
                     IPHONEOS_DEPLOYMENT_TARGET=15.0 \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO

          # Paso 2: Diagnóstico
          echo "======================================="
          echo "=== DIAGNÓSTICO DEL BUILD IOS ==="
          echo "======================================="
          
          APP_DIR="build_ios/Build/Products/Release-iphoneos/ZionStageApple.app"

          # Verificar y asegurar que el binario ejecutable esté en .app
          APP_BINARY="$APP_DIR/ZionStageApple"
          if [ ! -f "$APP_BINARY" ]; then
            echo "--- Binario no estaba en .app, buscando en Intermediates ---"
            BINARY=$(find build_ios/Build/Intermediates.noindex -type f -name "ZionStageApple" 2>/dev/null | xargs file 2>/dev/null | grep -i "executable" | cut -d: -f1 | head -1)
            if [ -n "$BINARY" ]; then
              echo "=== Copiando binario ($BINARY) a .app ==="
              cp "$BINARY" "$APP_BINARY"
            fi
          fi

          if [ -f "$APP_BINARY" ]; then
            chmod +x "$APP_BINARY"
            echo "=== Binario verificado con éxito: $(ls -lh '$APP_BINARY') ==="
          else
            echo "!!! ERROR CRÍTICO: No se encontró el binario ejecutable !!!"
          fi

          # Eliminar cualquier Frameworks/ vacío o con librerías estáticas inválidas que rompan Sideloadly
          if [ -d "$APP_DIR/Frameworks" ]; then
            for fw in "$APP_DIR/Frameworks"/*.framework; do
              if [ -d "$fw" ]; then
                fw_name=$(basename "$fw" .framework)
                if [ ! -f "$fw/$fw_name" ]; then
                  echo "=== Removiendo framework estático sin binario dinámico (para compatibilidad con Sideloadly): $fw ==="
                  rm -rf "$fw"
                fi
              fi
            done
            # Si la carpeta Frameworks quedó vacía, eliminarla
            rmdir "$APP_DIR/Frameworks" 2>/dev/null || true
          fi

          echo "=== Contenido verificado de .app ==="
          ls -lah "$APP_DIR/"
          du -sh "$APP_DIR"

          # Paso 4: Empaquetar IPA de iOS
          mkdir -p build_ios/Payload
          cp -R "$APP_DIR" build_ios/Payload/
          cd build_ios && zip -r ZionStageApple.ipa Payload

          echo "=== Tamaño final del IPA ==="
          ls -lah ZionStageApple.ipa

      - name: Build macOS App
        script: |
          cd ZionStageApple
          xcodebuild -project ZionStageApple.xcodeproj \
                     -scheme ZionStageApple \
                     -sdk macosx \
                     -configuration Release \
                     -derivedDataPath build_macos \
                     MACOSX_DEPLOYMENT_TARGET=12.0 \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ZionStageApple/build_ios/*.ipa
      - ZionStageApple/build_ios/Build/Products/Release-iphoneos/*.app
      - ZionStageApple/build_macos/Build/Products/Release/*.app
