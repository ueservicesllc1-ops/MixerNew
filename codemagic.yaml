workflows:
  ios-native-workflow:
    name: Build Native Apple App (iOS, iPadOS, macOS)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Build iOS & iPadOS Physical App
        script: |
          cd ZionStageApple

          # ══════════════════════════════════════════
          # PASO 1: Compilar para iOS usando -destination
          # (Esto fuerza a SPM a compilar Firebase para iOS,
          #  no para macOS, evitando el error de .o faltantes)
          # ══════════════════════════════════════════
          xcodebuild build \
            -project ZionStageApple.xcodeproj \
            -scheme ZionStageApple \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build_ios \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

          # ══════════════════════════════════════════
          # PASO 2: Verificar el .app generado
          # ══════════════════════════════════════════
          echo "======================================="
          echo "=== DIAGNÓSTICO POST-BUILD ==="
          echo "======================================="

          APP_DIR="build_ios/Build/Products/Release-iphoneos/ZionStageApple.app"

          echo "--- Buscando .app ---"
          find build_ios -type d -name "ZionStageApple.app" 2>/dev/null

          echo "--- Buscando binarios ejecutables ZionStageApple ---"
          find build_ios -type f -name "ZionStageApple" 2>/dev/null | while read f; do
            echo "  $f  size=$(ls -lh "$f" | awk '{print $5}')  type=$(file "$f")"
          done

          # Si el .app no tiene el binario dentro, inyectarlo
          if [ -d "$APP_DIR" ]; then
            if [ ! -f "$APP_DIR/ZionStageApple" ]; then
              echo "=== Binario no está dentro del .app, buscando para inyectar ==="
              BINARY=$(find build_ios -type f -name "ZionStageApple" ! -path "*.app/*" 2>/dev/null | while read f; do
                if file "$f" | grep -qi "mach-o"; then echo "$f"; break; fi
              done)
              if [ -n "$BINARY" ]; then
                echo "=== Inyectando: $BINARY ==="
                cp "$BINARY" "$APP_DIR/ZionStageApple"
                chmod +x "$APP_DIR/ZionStageApple"
              fi
            fi

            echo "=== Contenido final del .app ==="
            ls -lah "$APP_DIR/"
            du -sh "$APP_DIR"
          else
            echo "!!! .app no encontrado en ruta esperada, buscando alternativa ==="
            APP_DIR=$(find build_ios -type d -name "ZionStageApple.app" 2>/dev/null | head -1)
            if [ -n "$APP_DIR" ]; then
              echo "=== Encontrado en: $APP_DIR ==="
              ls -lah "$APP_DIR/"
              du -sh "$APP_DIR"
            else
              echo "!!! ERROR CRÍTICO: No existe ningún .app !!!"
              exit 1
            fi
          fi

          # ══════════════════════════════════════════
          # PASO 3: Empaquetar IPA
          # ══════════════════════════════════════════
          rm -rf build_ios/Payload build_ios/ZionStageApple.ipa
          mkdir -p build_ios/Payload
          cp -R "$APP_DIR" build_ios/Payload/
          cd build_ios && zip -r ZionStageApple.ipa Payload

          echo "======================================="
          echo "=== TAMAÑO FINAL DEL IPA ==="
          echo "======================================="
          ls -lah ZionStageApple.ipa

      - name: Build macOS App
        script: |
          cd ZionStageApple
          xcodebuild build \
            -project ZionStageApple.xcodeproj \
            -scheme ZionStageApple \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build_macos \
            MACOSX_DEPLOYMENT_TARGET=12.0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ZionStageApple/build_ios/*.ipa
      - ZionStageApple/build_ios/Build/Products/Release-iphoneos/*.app
      - ZionStageApple/build_macos/Build/Products/Release/*.app
