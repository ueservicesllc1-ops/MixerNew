workflows:
  ios-native-workflow:
    name: Build Native Apple App (iOS, iPadOS, macOS)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Build iOS & iPadOS Physical App
        script: |
          cd ZionStageApple

          # Paso 1: Generar el paquete de archivo oficial (xcodebuild archive)
          xcodebuild archive -project ZionStageApple.xcodeproj \
                             -scheme ZionStageApple \
                             -destination 'generic/platform=iOS' \
                             -archivePath build_ios/ZionStageApple.xcarchive \
                             -configuration Release \
                             IPHONEOS_DEPLOYMENT_TARGET=15.0 \
                             CODE_SIGN_IDENTITY="" \
                             CODE_SIGNING_REQUIRED=NO \
                             CODE_SIGNING_ALLOWED=NO

          # Paso 2: Ruta oficial del .app empaquetado dentro del archive
          APP_DIR="build_ios/ZionStageApple.xcarchive/Products/Applications/ZionStageApple.app"

          echo "======================================="
          echo "=== DIAGNÓSTICO DEL ARCHIVE IOS ==="
          echo "======================================="

          if [ -d "$APP_DIR" ]; then
            echo "=== Contenido del .app compilado en Archive ==="
            ls -lah "$APP_DIR/"
            du -sh "$APP_DIR"
          else
            echo "!!! ERROR CRÍTICO: No se generó el .app en el Archive !!!"
          fi

          # Paso 3: Crear el archivo .ipa comprimiendo el Payload
          mkdir -p build_ios/Payload
          cp -R "$APP_DIR" build_ios/Payload/
          cd build_ios && zip -r ZionStageApple.ipa Payload

          echo "=== Tamaño final del IPA de iOS ==="
          ls -lah ZionStageApple.ipa

      - name: Build macOS App
        script: |
          cd ZionStageApple
          xcodebuild -project ZionStageApple.xcodeproj \
                     -scheme ZionStageApple \
                     -sdk macosx \
                     -configuration Release \
                     -derivedDataPath build_macos \
                     MACOSX_DEPLOYMENT_TARGET=12.0 \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ZionStageApple/build_ios/*.ipa
      - ZionStageApple/build_ios/Build/Products/Release-iphoneos/*.app
      - ZionStageApple/build_macos/Build/Products/Release/*.app
