workflows:
  ios-native-workflow:
    name: Build Native Apple App (iOS, iPadOS, macOS)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Build iOS & iPadOS Physical App
        script: |
          cd ZionStageApple
          xcodebuild -project ZionStageApple.xcodeproj \
                     -scheme ZionStageApple \
                     -sdk iphoneos \
                     -configuration Release \
                     -derivedDataPath build \
                     IPHONEOS_DEPLOYMENT_TARGET=15.0 \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO
          
          echo "--- Contenido de Release-iphoneos ---"
          ls -lah build/Build/Products/Release-iphoneos/ || true
          
          mkdir -p build/Payload
          find build/Build/Products/Release-iphoneos -name "*.app" -exec cp -R {} build/Payload/ \;
          
          echo "--- Contenido de Payload (copiado) ---"
          ls -lah build/Payload/
          ls -lah build/Payload/*.app/ || true
          
          cd build && zip -r ZionStageApple.ipa Payload
      - name: Build macOS App
        script: |
          cd ZionStageApple
          xcodebuild -project ZionStageApple.xcodeproj \
                     -scheme ZionStageApple \
                     -sdk macosx \
                     -configuration Release \
                     -derivedDataPath build \
                     MACOSX_DEPLOYMENT_TARGET=12.0 \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ZionStageApple/build/*.ipa
      - ZionStageApple/build/Build/Products/Release-iphoneos/*.app
      - ZionStageApple/build/Build/Products/Release/*.app
