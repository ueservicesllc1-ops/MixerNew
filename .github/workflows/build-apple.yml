name: Build Native Apple (iOS, iPadOS, macOS)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apple-apps:
    name: Build Apple Native Binaries
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build iOS & iPadOS App (Simulator/Device Target)
        run: |
          cd ZionStageApple
          xcodebuild -project ZionStageApple.xcodeproj \
                     -scheme ZionStageApple \
                     -sdk iphonesimulator \
                     -configuration Release \
                     clean build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO

      - name: Build macOS App
        run: |
          cd ZionStageApple
          xcodebuild -project ZionStageApple.xcodeproj \
                     -scheme ZionStageApple \
                     -sdk macosx \
                     -configuration Release \
                     clean build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS & macOS Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZionStageApple-Release-Builds
          path: |
            ZionStageApple/build/Release-iphonesimulator/*.app
            ZionStageApple/build/Release/*.app
