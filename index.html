<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo2.png?v=2" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zion Stage — Pro Worship Mixer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root" translate="no"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Service Worker solo en build de producción — ver main.jsx (en dev el SW rompe manifest.json + HMR)
    // Capture PWA install prompt so the Windows install button can trigger it
    window._pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window._pwaInstallPrompt = e;
    });
  </script>
</body>

</html>
