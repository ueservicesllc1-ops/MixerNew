<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo2.png?v=2" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zion Stage — Pro Worship Mixer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      background-color: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }
  </style>
  <script>
    window.addEventListener('error', function(e) {
      var d = document.createElement('div');
      d.style.position = 'fixed';
      d.style.top = '0';
      d.style.left = '0';
      d.style.right = '0';
      d.style.padding = '20px';
      d.style.backgroundColor = 'rgba(200, 0, 0, 0.9)';
      d.style.color = 'white';
      d.style.zIndex = '9999999';
      d.style.fontSize = '12px';
      d.style.fontFamily = 'monospace';
      d.style.wordBreak = 'break-word';
      d.innerHTML = '<b>JS Crash:</b> ' + e.message + '<br>' + e.filename + ':' + e.lineno + '<br><br>' + (e.error ? e.error.stack : '');
      document.body.appendChild(d);
    });
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.createElement('div');
      d.style.position = 'fixed';
      d.style.bottom = '0';
      d.style.left = '0';
      d.style.right = '0';
      d.style.padding = '20px';
      d.style.backgroundColor = 'rgba(150, 50, 0, 0.9)';
      d.style.color = 'white';
      d.style.zIndex = '9999999';
      d.style.fontSize = '12px';
      d.style.fontFamily = 'monospace';
      d.style.wordBreak = 'break-word';
      d.innerHTML = '<b>Promise Crash:</b> ' + (e.reason ? e.reason.message || e.reason : 'Unknown');
      document.body.appendChild(d);
    });
  </script>
</head>

<body>
  <div id="root" translate="no"></div>
  <script type="module" src="/src/main.jsx"></script>
  <!-- URL del instalador .exe: Vite inyecta `window.__ZION_DESKTOP_INSTALLER_URL__` al compilar (VITE_DESKTOP_INSTALLER_URL). -->
</body>

</html>
